name: Bug report
description: Сообщить об ошибке в Habits
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Не прикладывайте пароли, JSON-экспорты, email других людей и скриншоты с личными данными.

  - type: input
    id: version
    attributes:
      label: Версия Habits
      placeholder: 0.3.0-beta.1
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Устройство и Android
      placeholder: Samsung A54, Android 15
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Язык приложения
      options:
        - Русский
        - English
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Что нужно сделать, чтобы увидеть ошибку?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true

  - type: dropdown
    id: sync
    attributes:
      label: Связано ли это с синхронизацией
      options:
        - Нет
        - Возможно
        - Да
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Безопасные скриншоты или дополнительные сведения
